<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fff5f7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(255, 105, 135, 0.2);
    width: 90%;
    max-width: 380px;
    position: relative;
    z-index: 2;
    animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform: scale(0.9);}
    to {opacity:1; transform: scale(1);}
}
h1 {
    font-size: 20px;
    margin-bottom: 20px;
    color: #444;
}
button {
    padding: 12px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    margin: 8px;
    transition: 0.3s;
}
.yes {
    background: #ff8fab;
    color: white;
}
.no {
    background: #eee;
}
button:hover {
    transform: scale(1.05);
}
.hidden { display: none; }
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 100%;
    border-radius: 12px;
    border: 1px solid #eee;
}
img {
    width: 120px;
    border-radius: 20px;
    margin-bottom: 15px;
}
.heart {
    position: fixed;
    top: -10px;
    color: #ff8fab;
    animation: fall linear forwards;
    z-index: 1;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="container" id="step1">
    <img src="https://cdn.pixabay.com/photo/2017/11/09/21/41/cat-2934720_1280.jpg">
    <h1>Пойдёшь со мной на свидание? 🥺💖</h1>
    <button class="yes" onclick="nextStep()">Да 💕</button>
    <button class="no" onclick="moveNo(this)">Нет 🙈</button>
</div>

<div class="container hidden" id="step2">
    <h1>ЧТО 😳 ты правда согласилась?!</h1>
    <button class="yes" onclick="showDate()">Ну да 😅</button>
</div>

<div class="container hidden" id="step3">
    <h1>Когда ты свободна? 🗓</h1>
    <input type="date" id="date">
    <input type="time" id="time">
    <button class="yes" onclick="showIdeas()">Дальше 💘</button>
</div>

<div class="container hidden" id="step4">
